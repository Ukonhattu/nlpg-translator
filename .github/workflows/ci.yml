name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run lint

  integration:
    runs-on: ubuntu-latest
    if: ${{ secrets.AALTO_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:integration
        env:
          AALTO_API_KEY: ${{ secrets.AALTO_API_KEY }}
          AALTO_ENDPOINT: ${{ secrets.AALTO_ENDPOINT }}
          LLM_GATEWAY_API_KEY: ${{ secrets.LLM_GATEWAY_API_KEY }}
          LLM_GATEWAY_RESPONSES_ENDPOINT: ${{ secrets.LLM_GATEWAY_RESPONSES_ENDPOINT }}
          LLM_GATEWAY_MODEL: ${{ secrets.LLM_GATEWAY_MODEL }}
